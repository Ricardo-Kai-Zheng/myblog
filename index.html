<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>首页 —— 个人博客</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-inner">
      <a class="nav-brand" href="index.html">📝 我的博客</a>
      <div class="nav-links">
        <a href="index.html">首页</a>
        <a href="archive.html">文章</a>
        <a href="projects.html">项目</a>
        <a href="about.html">关于</a>
        <button id="theme-toggle" class="theme-toggle" aria-label="切换暗色模式">🌙</button>
      </div>
    </div>
  </nav>

  <main class="container">
    <h1 class="page-title">📄 最新文章</h1>
    <div id="card-grid" class="card-grid"></div>
    <div id="pagination" class="pagination"></div>
  </main>

  <!-- 在此插入 counter.dev 脚本 -->

  <footer class="site-footer">
    <p>&copy; 2026 我的博客 | Powered by GitHub Pages</p>
  </footer>

  <button id="scroll-top-btn" class="scroll-top-btn" aria-label="回到顶部">↑</button>

  <script src="js/pagination.js"></script>
  <script src="js/main.js"></script>
  <script>
    // 首页：加载 posts.json 并渲染卡片分页
    fetch('posts/posts.json')
      .then(res => res.json())
      .then(posts => {
        // 按日期倒序排列（最新在前）
        posts.sort((a, b) => {
          if (a.date !== b.date) return b.date.localeCompare(a.date);
          return b.id - a.id;
        });

        const grid = document.getElementById('card-grid');
        const paginationContainer = document.getElementById('pagination');

        function renderCards(pageItems) {
          grid.innerHTML = pageItems.map(post => {
            // 截取摘要前 100 个字符
            const summary = post.summary.length > 100
              ? post.summary.substring(0, 100) + '...'
              : post.summary;

            return `
              <article class="card">
                <div class="card-header">
                  <span class="card-icon">📄</span>
                  <h2 class="card-title">
                    <a href="${post.filePath}">${post.title}</a>
                  </h2>
                </div>
                <div class="card-date">📅 ${post.date}</div>
                <p class="card-summary">${summary}</p>
              </article>
            `;
          }).join('');
        }

        const pg = new Pagination(posts, 10, paginationContainer, renderCards);
        pg.goTo(1);
      })
      .catch(err => {
        console.error('加载文章列表失败：', err);
        document.getElementById('card-grid').innerHTML =
          '<p style="text-align:center;color:var(--text-muted);">文章加载失败，请稍后重试。</p>';
      });
  </script>
</body>
</html>
