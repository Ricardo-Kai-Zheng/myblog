  <script>
    // Typewriter
    (function () {
      const tagline = 'reading, coding, capturing the light in life.';
      const el = document.getElementById('typewriter');
      let i = 0;
      function type() {
        if (i < tagline.length) {
          el.textContent += tagline.charAt(i);
          i++;
          setTimeout(type, 80 + Math.random() * 50);
        }
      }
      setTimeout(type, 400);
    })();

    // Load posts
    fetch('posts/posts.json')
      .then(res => res.json())
      .then(posts => {
        const grid = document.getElementById('card-grid');
        const paginationContainer = document.getElementById('pagination');

        posts.sort((a, b) => {
          if (a.date !== b.date) return b.date.localeCompare(a.date);
          return b.id - a.id;
        });

        function renderCards(pageItems) {
          grid.innerHTML = pageItems.map(post => {
            const summary = post.summary && post.summary.length > 100
              ? post.summary.substring(0, 100) + '...'
              : post.summary || '';
            return `
              <article class="card">
                <div class="card-header">
                  <span class="card-icon">[F]</span>
                  <h3 class="card-title">
                    <a href="${post.filePath}">${post.title}</a>
                  </h3>
                </div>
                <div class="card-date">${post.date}</div>
                <p class="card-summary">${summary}</p>
              </article>
            `;
          }).join('');
        }

        const pg = new Pagination(posts, 10, paginationContainer, renderCards);
        pg.goTo(1);

        if (posts.length === 0) {
          grid.innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:2rem;font-family:var(--font-heading)">[ NO POSTS YET ]</p>';
        }
      })
      .catch(err => {
        console.error('Failed to load posts:', err);
        document.getElementById('card-grid').innerHTML =
          '<p style="text-align:center;color:var(--text-muted);padding:2rem;font-family:var(--font-heading)">[ LOAD FAILED ]</p>';
      });
  </script>
