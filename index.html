  <main class="container">

      <div class="skeleton-card"><div class="skeleton-line title"></div><div class="skeleton-line date"></div><div class="skeleton-line long"></div><div class="skeleton-line medium"></div><div class="skeleton-line short"></div></div>
    </div>

  </main>

    <div class="footer-nav">
      <a href="index.html">Home</a>
      <a href="archive.html">Posts</a>
      <a href="projects.html">Projects</a>

  <button id="scroll-top-btn" class="scroll-top-btn" aria-label="back to top">^</button>

  <script src="js/scene.js"></script>
  <script src="js/pagination.js"></script>
  <script src="js/main.js"></script>
  <script>
    // Typewriter
    (function(){
      const tagline = 'Life is for rent';
      const el = document.getElementById('typewriter');
      let i=0;
      function type(){
        if(i<tagline.length){el.textContent+=tagline.charAt(i);i++;setTimeout(type,80+Math.random()*50)}
      }
      setTimeout(type,400);
    })();

    // Load posts
    fetch('posts/posts.json')
      .then(res=>res.json())
      .then(posts=>{
        const grid=document.getElementById('card-grid');
        const paginationContainer=document.getElementById('pagination');
        posts.sort((a,b)=>{if(a.date!==b.date)return b.date.localeCompare(a.date);return b.id-a.id});

        function renderCards(pageItems){
          grid.innerHTML=pageItems.map(post=>{
            const summary=post.summary&&post.summary.length>100?post.summary.substring(0,100)+'...':post.summary||'';
            return '<article class="card"><div class="card-header"><canvas class="card-icon" width="64" height="64" data-icon="paper"></canvas><h3 class="card-title"><a href="'+post.filePath+'">'+post.title+'</a></h3></div><div class="card-date">'+post.date+'</div><p class="card-summary">'+summary+'</p></article>';
          }).join('');
          // draw card icons
          document.querySelectorAll('.card-icon').forEach(c=>drawIcon(c,c.dataset.icon));
        }

        const pg=new Pagination(posts,10,paginationContainer,renderCards);
        pg.goTo(1);
        if(posts.length===0){grid.innerHTML='<p style="text-align:center;color:var(--ink-light);padding:2rem;font-family:var(--font-pixel)">~ No posts yet ~</p>'}
      })
      .catch(err=>{console.error(err);document.getElementById('card-grid').innerHTML='<p style="text-align:center;color:var(--ink-light);padding:2rem;font-family:var(--font-pixel)">~ Load failed ~</p>'});
  </script>
</body>
</html>
