<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文章归档 —— 个人博客</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-inner">
      <a class="nav-brand" href="index.html">📝 我的博客</a>
      <div class="nav-links">
        <a href="index.html">首页</a>
        <a href="archive.html">文章</a>
        <a href="projects.html">项目</a>
        <a href="about.html">关于</a>
        <button id="theme-toggle" class="theme-toggle" aria-label="切换暗色模式">🌙</button>
      </div>
    </div>
  </nav>

  <main class="archive-container">
    <h1 class="page-title">📚 文章归档</h1>
    <ul id="archive-list" class="archive-list"></ul>
    <div id="pagination" class="pagination"></div>
  </main>

  <!-- 在此插入 counter.dev 脚本 -->

  <footer class="site-footer">
    <p>&copy; 2026 我的博客 | Powered by GitHub Pages</p>
  </footer>

  <button id="scroll-top-btn" class="scroll-top-btn" aria-label="回到顶部">↑</button>

  <script src="js/pagination.js"></script>
  <script src="js/main.js"></script>
  <script>
    // 归档页：加载 posts.json 并渲染标题列表分页
    fetch('posts/posts.json')
      .then(res => res.json())
      .then(posts => {
        // 按日期倒序排列
        posts.sort((a, b) => {
          if (a.date !== b.date) return b.date.localeCompare(a.date);
          return b.id - a.id;
        });

        const list = document.getElementById('archive-list');
        const paginationContainer = document.getElementById('pagination');

        function renderList(pageItems) {
          list.innerHTML = pageItems.map(post => `
            <li>
              <div class="archive-item">
                <span class="archive-date">${post.date}</span>
                <span>—</span>
                <a class="archive-link" href="${post.filePath}">${post.title}</a>
              </div>
            </li>
          `).join('');
        }

        const pg = new Pagination(posts, 20, paginationContainer, renderList);
        pg.goTo(1);
      })
      .catch(err => {
        console.error('加载文章列表失败：', err);
        document.getElementById('archive-list').innerHTML =
          '<li style="text-align:center;color:var(--text-muted);">文章加载失败，请稍后重试。</li>';
      });
  </script>
</body>
</html>
