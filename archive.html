<script src="js/scene.js"></script><script src="js/pagination.js"></script><script src="js/main.js"></script>
<script>
    // Load posts
    fetch('posts/posts.json')
      .then(res=>res.json())
      .then(posts=>{
        const list=document.getElementById('archive-list');
        const pc=document.getElementById('pagination');
        posts.sort((a,b)=>{if(a.date!==b.date)return b.date.localeCompare(a.date);return b.id-a.id});

        function renderList(pageItems){
          list.innerHTML=pageItems.map(p=>{
            return '<li><div class="archive-item"><a class="archive-link" href="'+p.filePath+'">'+p.title+'</a><span class="archive-date">'+p.date+'</span></div></li>';
          }).join('');
        }

        const pg=new Pagination(posts,20,pc,renderList);
        pg.goTo(1);
        if(posts.length===0){list.innerHTML='<li style="text-align:center;color:var(--ink-light);padding:2rem;font-family:var(--font-pixel)">~ No posts yet ~</li>'}
      })
      .catch(err=>{console.error(err);document.getElementById('archive-list').innerHTML='<li style="text-align:center;color:var(--ink-light);font-family:var(--font-pixel)">~ Load failed ~</li>'});
  </script>
