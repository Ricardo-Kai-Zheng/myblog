          <p class="card-desc">克苏鲁神话主题的 Roguelike 卡牌构筑游戏。在 12 小时钟面上步步前进，通过卡牌战斗、空洞献祭、商店购买来构筑牌组。核心围绕"侵蚀值"机制——每走一步侵蚀+1，累计到阈值触发负面效果。击败最终 Boss"渡鸦之钟"可达成 3 种结局之一。像素恐怖视觉风格，原生 Canvas 渲染。</p>
